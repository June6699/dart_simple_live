name: app-build-ios-manual

on:
  workflow_dispatch:
    inputs:
      build_ios:
        description: "Build iOS unsigned IPA on GitHub Actions"
        type: boolean
        default: true
      ref:
        description: "Git ref to build, for example master or v1.12.0"
        required: false
        default: "master"
      upload_release:
        description: "Upload build outputs to the matching GitHub Release when ref is a tag"
        required: false
        default: false
        type: boolean

jobs:
  build-ios:
    if: ${{ inputs.build_ios == true }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          cache: true

      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Resolve ref info
        id: ref_info
        shell: bash
        run: |
          ref_name="${{ inputs.ref }}"
          if [[ "$ref_name" == refs/tags/* ]]; then
            ref_name="${ref_name#refs/tags/}"
          fi
          is_tag="false"
          if [[ "$ref_name" == v* ]]; then
            is_tag="true"
          fi
          echo "ref_name=$ref_name" >> "$GITHUB_OUTPUT"
          echo "is_tag=$is_tag" >> "$GITHUB_OUTPUT"

      - name: Build iOS
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          cd simple_live_app
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_no_sign.ipa Payload

      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      - name: Upload Release
        if: ${{ inputs.upload_release && steps.ref_info.outputs.is_tag == 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.ref_info.outputs.ref_name }}
          name: ${{ steps.ref_info.outputs.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.ref_info.outputs.ref_name, 'beta') || contains(steps.ref_info.outputs.ref_name, 'alpha') || contains(steps.ref_info.outputs.ref_name, 'pre') || contains(steps.ref_info.outputs.ref_name, 'next') || contains(steps.ref_info.outputs.ref_name, 'local') }}
          token: ${{ github.token }}
          fail_on_unmatched_files: false
          files: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      - run: echo "iOS manual job status is ${{ job.status }}."
