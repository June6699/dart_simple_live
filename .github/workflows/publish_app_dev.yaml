name: app-build-action-dev

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android APKs"
        type: boolean
        default: false
      build_ios:
        description: "Build iOS unsigned IPA"
        type: boolean
        default: false
      build_macos:
        description: "Build macOS DMG and ZIP"
        type: boolean
        default: false
      build_windows:
        description: "Build Windows packages"
        type: boolean
        default: false
      build_linux:
        description: "Build Linux packages"
        type: boolean
        default: false
  push:
    tags:
      - "dev_v*"

jobs:
  resolve-targets:
    runs-on: ubuntu-22.04
    outputs:
      build_android: ${{ steps.resolve.outputs.build_android }}
      build_ios: ${{ steps.resolve.outputs.build_ios }}
      build_macos: ${{ steps.resolve.outputs.build_macos }}
      build_windows: ${{ steps.resolve.outputs.build_windows }}
      build_linux: ${{ steps.resolve.outputs.build_linux }}
    steps:
      - id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ANDROID: ${{ inputs.build_android }}
          INPUT_IOS: ${{ inputs.build_ios }}
          INPUT_MACOS: ${{ inputs.build_macos }}
          INPUT_WINDOWS: ${{ inputs.build_windows }}
          INPUT_LINUX: ${{ inputs.build_linux }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            build_android="${INPUT_ANDROID:-false}"
            build_ios="${INPUT_IOS:-false}"
            build_macos="${INPUT_MACOS:-false}"
            build_windows="${INPUT_WINDOWS:-false}"
            build_linux="${INPUT_LINUX:-false}"

            if [[ "$build_android" != "true" && \
                  "$build_ios" != "true" && \
                  "$build_macos" != "true" && \
                  "$build_windows" != "true" && \
                  "$build_linux" != "true" ]]; then
              echo "请至少勾选一个构建目标。" >&2
              exit 1
            fi
          else
            build_android=false
            build_ios=true
            build_macos=true
            build_windows=false
            build_linux=false
          fi

          {
            echo "build_android=$build_android"
            echo "build_ios=$build_ios"
            echo "build_macos=$build_macos"
            echo "build_windows=$build_windows"
            echo "build_linux=$build_linux"
          } >> "$GITHUB_OUTPUT"

  # 打包Android
  build-android:
    needs: resolve-targets
    if: ${{ needs.resolve-targets.outputs.build_android == 'true' }}
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      # 签出代码
      - uses: actions/checkout@v4

      # APK签名设置
      - name: Prepare Android keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$STORE_PASSWORD" && -n "$KEY_PASSWORD" && -n "$KEY_ALIAS" ]]; then
            printf '%s' "$KEYSTORE_BASE64" | openssl base64 -d -A > simple_live_app/android/release-keystore.jks
            printf 'storeFile=../release-keystore.jks\nstorePassword=%s\nkeyPassword=%s\nkeyAlias=%s\n' "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > simple_live_app/android/key.properties
          fi

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          cache: true

      # 更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 打包APK
      - name: Build APK
        run: |
          cd simple_live_app
          flutter build apk --release --split-per-abi

      #上传Artifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      #完成
      - run: echo "🍏 Android job's status is ${{ job.status }}."

  # 打包iOS
  build-ios:
    needs: resolve-targets
    if: ${{ needs.resolve-targets.outputs.build_ios == 'true' }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # 签出代码
      - uses: actions/checkout@v4

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          cache: true

      # 更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      #打包iOS
      - name: Build IPA
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      #创建未签名ipa
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_no_sign.ipa Payload
          cd ../../..

      # 上传IPA至Artifacts
      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      #完成
      - run: echo "🍏 iOS job's status is ${{ job.status }}."

  # 打包macOS
  build-macos:
    needs: resolve-targets
    if: ${{ needs.resolve-targets.outputs.build_macos == 'true' }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # 签出代码
      - uses: actions/checkout@v4

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          cache: true

      # 打开MAC Desktop支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      # 更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 安装appdmg npm install -g appdmg
      - name: Install appdmg
        run: npm install -g appdmg

      # 设置flutter_distributor环境
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      # 打包MAC
      - name: Build MacOS
        run: |
          cd simple_live_app
          flutter_distributor package --platform macos --targets dmg,zip --skip-clean

      # 上传MAC至Artifacts
      - name: Upload MacOS to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip

      #完成
      - run: echo "🍏 macOS job's status is ${{ job.status }}."

  # 打包Linux
  build-linux:
    needs: resolve-targets
    if: ${{ needs.resolve-targets.outputs.build_linux == 'true' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # 签出代码
      - uses: actions/checkout@v4
      # 设置Flutter环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          cache: true
      # 安装依赖
      - name: Update apt-get
        run: sudo apt-get update
      - name: Install Dependencies
        run: sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev libmpv-dev mpv
      # 打开Linux Desktop支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-linux-desktop
      # 更新Flutter的packages
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get
      # 设置flutter_distributor环境
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor
      # build Linux ZIP\DMG
      - name: Build Linux
        run: |
          cd simple_live_app
          flutter_distributor package --platform linux --targets deb,zip --skip-clean
      # 上传Linux包至Artifacts
      - name: Upload Linux APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            simple_live_app/build/dist/*/*.deb
            simple_live_app/build/dist/*/*.zip

        #完成
      - run: echo "🍏 Linux job's status is ${{ job.status }}."

  # 打包Windows
  build-windows:
    needs: resolve-targets
    if: ${{ needs.resolve-targets.outputs.build_windows == 'true' }}
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      # 签出代码
      - uses: actions/checkout@v4
      # 设置Flutter环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          cache: true
      - name: Enable Flutter Desktop
        run: flutter config --enable-windows-desktop
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get
      # 设置flutter_distributor环境
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor
      # build Windows ZIP\MSIX
      - name: Build Windows
        run: |
          cd simple_live_app
          flutter_distributor package --platform windows --targets msix,zip --skip-clean
      # 上传Windows至Artifacts
      - name: Upload Windows APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            simple_live_app/build/dist/*/*.msix
            simple_live_app/build/dist/*/*.zip
        #完成
      - run: echo "🍏 Windows job's status is ${{ job.status }}."
