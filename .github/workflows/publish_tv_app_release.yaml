name: app-build-action
on:
  workflow_dispatch:
    inputs:
      build_tv:
        description: "Build Android TV on GitHub Actions"
        type: boolean
        default: false
      ref:
        description: "Git ref to build, for example master or tv_v1.7.1"
        required: false
        default: "master"
      upload_release:
        description: "Upload build outputs to the matching GitHub Release when ref is a TV tag"
        required: false
        default: false
        type: boolean
jobs:
  build-tv:
    if: ${{ inputs.build_tv == true }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      #签出代码
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      #APK签名设置
      - name: Prepare Android keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.TV_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.TV_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.TV_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.TV_KEY_ALIAS }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$STORE_PASSWORD" && -n "$KEY_PASSWORD" && -n "$KEY_ALIAS" ]]; then
            printf '%s' "$KEYSTORE_BASE64" | openssl base64 -d -A > simple_live_tv_app/android/release-keystore.jks
            printf 'storeFile=../release-keystore.jks\nstorePassword=%s\nkeyPassword=%s\nkeyAlias=%s\n' "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > simple_live_tv_app/android/key.properties
          fi

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      #设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          cache: true

      #更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_tv_app
          flutter pub get

      #打包APK
      - name: Build APK
        run: |
          cd simple_live_tv_app
          flutter build apk --release --split-per-abi

      - name: Rename APK for Release
        run: |
          cd simple_live_tv_app/build/app/outputs/flutter-apk
          cp app-armeabi-v7a-release.apk SimpleLive-TV-armeabi-v7a-release.apk
          cp app-arm64-v8a-release.apk SimpleLive-TV-arm64-v8a-release.apk
          cp app-x86_64-release.apk SimpleLive-TV-x86_64-release.apk

      #上传APK至Artifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_tv
          path: |
            simple_live_tv_app/build/app/outputs/flutter-apk/SimpleLive-TV-armeabi-v7a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/SimpleLive-TV-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/SimpleLive-TV-x86_64-release.apk

      #读取版本信息
      - name: Read version
        id: version
        uses: juliangruber/read-file-action@v1
        with:
          path: assets/tv_app_version.json
      - name: Echo version
        run: echo "${{ fromJson(steps.version.outputs.content).version }}"
      - name: Echo version content
        run: echo "${{ fromJson(steps.version.outputs.content).version_desc }}"

      - name: Resolve ref info
        id: ref_info
        shell: bash
        run: |
          ref_name="${{ inputs.ref }}"
          if [[ "$ref_name" == refs/tags/* ]]; then
            ref_name="${ref_name#refs/tags/}"
          fi
          is_tag="false"
          if [[ "$ref_name" == tv_v* ]]; then
            is_tag="true"
          fi
          echo "ref_name=$ref_name" >> "$GITHUB_OUTPUT"
          echo "is_tag=$is_tag" >> "$GITHUB_OUTPUT"

      #上传至Release
      - name: Upload Release
        if: ${{ inputs.upload_release && steps.ref_info.outputs.is_tag == 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.ref_info.outputs.ref_name }}
          name: ${{ steps.ref_info.outputs.ref_name }}
          body: "# Android TV \n${{ fromJson(steps.version.outputs.content).version_desc }}"
          prerelease: ${{ fromJson(steps.version.outputs.content).prerelease || contains(steps.ref_info.outputs.ref_name, 'pre') || contains(steps.ref_info.outputs.ref_name, 'next') || contains(steps.ref_info.outputs.ref_name, 'local') }}
          token: ${{ github.token }}
          files: |
            simple_live_tv_app/build/app/outputs/flutter-apk/SimpleLive-TV-x86_64-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/SimpleLive-TV-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/SimpleLive-TV-armeabi-v7a-release.apk

      #完成
      - run: echo "🍏 This job's status is ${{ job.status }}."
