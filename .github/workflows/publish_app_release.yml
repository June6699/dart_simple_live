name: app-build-android-release

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android on GitHub Actions"
        type: boolean
        default: false
      ref:
        description: "Git ref to build, for example master or v1.12.0"
        required: false
        default: "master"
      upload_release:
        description: "Upload build outputs to the matching GitHub Release when ref is a tag"
        required: false
        default: false
        type: boolean

jobs:
  build-android:
    if: ${{ inputs.build_android == true }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Prepare Android keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$STORE_PASSWORD" && -n "$KEY_PASSWORD" && -n "$KEY_ALIAS" ]]; then
            printf '%s' "$KEYSTORE_BASE64" | openssl base64 -d -A > simple_live_app/android/release-keystore.jks
            printf 'storeFile=../release-keystore.jks\nstorePassword=%s\nkeyPassword=%s\nkeyAlias=%s\n' "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > simple_live_app/android/key.properties
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          cache: true

      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          app_version="$(grep '^version:' simple_live_app/pubspec.yaml | awk '{print $2}')"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Resolve ref info
        id: ref_info
        shell: bash
        run: |
          ref_name="${{ inputs.ref }}"
          if [[ "$ref_name" == refs/tags/* ]]; then
            ref_name="${ref_name#refs/tags/}"
          fi
          is_tag="false"
          if [[ "$ref_name" == v* ]]; then
            is_tag="true"
          fi
          echo "ref_name=$ref_name" >> "$GITHUB_OUTPUT"
          echo "is_tag=$is_tag" >> "$GITHUB_OUTPUT"

      - name: Build Android APK
        run: |
          cd simple_live_app
          flutter build apk --release

      - name: Rename APK for release
        id: apk_asset
        shell: bash
        run: |
          asset_path="simple_live_app/build/app/outputs/flutter-apk/simple_live_app-${{ steps.app_version.outputs.app_version }}-android.apk"
          cp simple_live_app/build/app/outputs/flutter-apk/app-release.apk "$asset_path"
          echo "asset_path=$asset_path" >> "$GITHUB_OUTPUT"

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: ${{ steps.apk_asset.outputs.asset_path }}

      - name: Upload Release
        if: ${{ inputs.upload_release && steps.ref_info.outputs.is_tag == 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.ref_info.outputs.ref_name }}
          name: ${{ steps.ref_info.outputs.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.ref_info.outputs.ref_name, 'beta') || contains(steps.ref_info.outputs.ref_name, 'alpha') || contains(steps.ref_info.outputs.ref_name, 'pre') || contains(steps.ref_info.outputs.ref_name, 'next') || contains(steps.ref_info.outputs.ref_name, 'local') }}
          token: ${{ github.token }}
          fail_on_unmatched_files: false
          files: ${{ steps.apk_asset.outputs.asset_path }}

      - run: echo "Android job status is ${{ job.status }}."
